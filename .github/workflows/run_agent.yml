name: Gemini Prefetch Paper Agent Workflow

on:
  schedule:
    - cron: '30 0 * * *'  # 每天早上北京时间 08:30 自动起床运行
  workflow_dispatch:      # 支持手动点击按钮测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查出库代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装运行依赖
      run: |
        pip install pyyaml google-genai

    - name: 启动 Gemini 论文追踪并生成网页
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      run: |
        python main.py

    # 【新增进化步骤】：自动将新生成的 index.html 推送回 GitHub 仓库
    - name: 自动提交网页并部署
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add index.html
        # 如果网页有更新，就推送到仓库；没有更新就忽略报错
        git diff --quiet && git diff --staged --quiet || git commit -m "🔄 自动同步最新论文网页 [$(date '+%Y-%m-%d %H:%M:%S')]"
        git push origin main
