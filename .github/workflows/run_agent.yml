name: Gemini Prefetch Paper Agent Workflow

on:
  schedule:
    - cron: '30 0 * * *'  # 每天早上北京时间 08:30 自动唤醒运行
  workflow_dispatch:      # 允许随时在网页端手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查出库代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装运行依赖
      run: |
        pip install pyyaml google-genai

    - name: 启动 Gemini 论文追踪并生成网页
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      run: |
        python main.py

    - name: Commit and Push (Conflict-Free)
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions[bot]"
        
        # 1. 强行先拉取线上最新的结构代码（如 main.py 和 config.yaml），但不盲目合并数据
        git fetch origin main
        
        # 2. 将当前的 index.html 和 paper_database.json 暂存起来
        git add index.html paper_database.json
        
        # 3. 提交当前云端最新生成的干净成果
        if git commit -m "🔄 智能同步最新顶会勋章文献 [$(date '+%Y-%m-%d %H:%M:%S')]" ; then
          echo "✅ 检测到学术大屏数据有更新，准备强推上线..."
          
          # 4. 工业级绝杀：使用强制拉取合并策略，如果在网页和数据上遇到冲突，一律以本次 Actions 刚刚运行生成的最新结果为准！
          git pull --rebase -X theirs origin main
          
          # 5. 安全推送
          git push origin main
        else
          echo "💤 今天没有抓取到满足半年的微架构新论文，无需更新网页。"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

