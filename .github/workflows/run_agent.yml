name: Gemini Prefetch Paper Agent Workflow

on:
  schedule:
    - cron: '30 0 * * *'  # 每天早上北京时间 08:30 自动唤醒运行
  workflow_dispatch:      # 允许随时在网页端手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查出库代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装运行依赖
      run: |
        pip install pyyaml google-genai

    - name: 启动 Gemini 论文追踪并生成网页
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      run: |
        python main.py

    - name: 自动同步数据库与静态网页（防冲突版）
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 将生成的网页和记忆数据库一起加入暂存区
        git add index.html paper_database.json
        
        if ! git diff --quiet --staged; then
          git commit -m "🔄 智能同步最新顶会勋章文献 [$(date '+%Y-%m-%d %H:%M:%S')]"
          git pull --rebase origin main
          git push origin main
        else
          echo "今日全网无符合条件的全新论文，无需更新数据库。"
        fi
