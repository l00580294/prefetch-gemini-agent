search_queries:
  # 收紧检索：锁定处理器、微架构、硬件预取、缓存优化，排除纯网络和安全密码学
  - 'ti:"hardware prefetch" OR ti:"prefetcher" OR abs:"hardware prefetcher" OR (abs:"cache subsystem" AND abs:"microarchitecture") OR abs:"memory wall"'

time_window:
  months: 6

filter_rules:
  include:
    - "prefetch"
    - "cache"
    - "memory"
    - "fetch"
    - "microarchitecture"
  exclude:
    - "cellular"
    - "5g"
    - "web"
    - "cdn"
    - "cryptography"
    - "quantum"
    - "security"
